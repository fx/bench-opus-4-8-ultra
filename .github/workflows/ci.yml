name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pin for reproducible CI; bump deliberately. Matches local dev.
          bun-version: "1.3.14"

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      # --- Lint / format -------------------------------------------------
      - name: gofmt
        run: |
          # Limit gofmt to first-party Go files; web/node_modules can contain
          # vendored Go we neither own nor format.
          files="$(find . -name '*.go' -not -path './web/node_modules/*')"
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "These Go files are not gofmt-clean:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: go vet
        run: go vet $(go list ./... | grep -v /node_modules/)

      - name: ESLint
        run: bun run lint
        working-directory: web

      - name: Prettier
        run: bun run format
        working-directory: web

      # --- Build ---------------------------------------------------------
      - name: Build frontend
        run: bun --cwd web run build

      - name: Build Go binary
        run: go build $(go list ./... | grep -v /node_modules/)

      # --- Test + 100% coverage gates -----------------------------------
      - name: Go tests + coverage gate
        run: |
          go test $(go list ./... | grep -v /node_modules/) -race -coverprofile=coverage.out -covermode=atomic
          bash scripts/check-coverage.sh coverage.out

      - name: Vitest + coverage gate
        run: bun run coverage
        working-directory: web
